name: MercadinhoSys CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

# Cancela execuções antigas do mesmo branch/PR quando um novo push chega.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # BACKEND — testes (pytest roda em SQLite in-memory via conftest)
  # ──────────────────────────────────────────────────────────────
  backend-test:
    name: Backend · pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-flask pytest-cov

      - name: Run tests with coverage
        working-directory: backend
        env:
          FLASK_ENV: testing
          JWT_SECRET_KEY: ci-secret-key
        run: pytest --cov=app --cov-report=xml tests/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────
  # BACKEND — lint (erros de sintaxe/símbolos quebram o build)
  # ──────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend · flake8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Lint (erros graves bloqueiam)
        run: flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Lint (estilo — não bloqueia)
        run: flake8 backend/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # ──────────────────────────────────────────────────────────────
  # FRONTEND — type-check + build (pega regressões de UI/tipos)
  # ──────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mercadinhosys-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/mercadinhosys-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (não bloqueia — apenas relatório)
        run: npm run lint || true

      - name: Type-check & build
        run: npm run build
