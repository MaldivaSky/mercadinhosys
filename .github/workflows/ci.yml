name: MercadinhoSys CI

on:
  push:
    branches: [ main, master, release/* ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    name: Backend Pytest & Multi-Tenant Audit
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: mercadinho_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov

      - name: Run Pytest Test Suite
        env:
          FLASK_ENV: testing
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/mercadinho_test
          JWT_SECRET_KEY: ci_test_jwt_secret_key_12345
          SKIP_DB_SETUP: "false"
        run: |
          pytest backend/tests --cov=backend/app --cov-report=term-missing

  frontend-build:
    name: Frontend TypeScript & Vite Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/mercadinhosys-frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend/mercadinhosys-frontend
        run: npm ci

      - name: Typecheck & Vite Build
        working-directory: ./frontend/mercadinhosys-frontend
        run: npm run build
