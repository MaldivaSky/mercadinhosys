name: Keep-Alive Backend (Anti Cold Start)

# Executa a cada 5 minutos para manter o servidor Render acordado.
# O plano gratuito do Render hiberna após ~15 min de inatividade,
# causando um "cold start" de 30-60s na próxima requisição.
# Este ping mantém o serviço responsivo 24/7 sem custo adicional.

on:
  schedule:
    # Cron: a cada 5 minutos, todos os dias
    - cron: '*/5 * * * *'
  # Permite rodar manualmente pelo GitHub Actions UI
  workflow_dispatch:

jobs:
  ping-backend:
    name: Ping Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping MercadinhoSys Backend
        run: |
          echo "🏥 Verificando saúde do backend em $(date '+%Y-%m-%d %H:%M:%S UTC')..."

          # "mercadinhosys-backend.onrender.com" é um nome de serviço morto
          # (não existe mais no Render) e "/api/auth/health" é uma rota de um
          # blueprint de auth antigo que não está registrado no app — as duas
          # coisas juntas garantiam 404/erro em todo run. O host real é
          # "mercadinhosys.onrender.com" e o health check é "/api/health".
          #
          # "|| echo 000" no curl garante que uma falha de rede transitória
          # (DNS, timeout, conexão recusada) não derrube o job via set -e do
          # bash da Actions ANTES do "exit 0" abaixo — sem isso, o "não falhar
          # de propósito" documentado nunca era garantido de verdade.
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            "https://mercadinhosys.onrender.com/api/health" || echo "000")

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Backend respondeu com HTTP 200 — serviço ativo!"
          else
            echo "⚠️  Backend respondeu com HTTP $RESPONSE — verifique o serviço."
            # Não falha o workflow para não gerar notificações desnecessárias
            exit 0
          fi
